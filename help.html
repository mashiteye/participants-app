<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .help-body { max-width: 540px; margin: 0 auto; padding: 1.5rem; }
    .help-section { background: white; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; border-left: 4px solid var(--orange); }
    .help-section h3 { font-size: 14px; font-weight: 800; color: var(--black); margin-bottom: 8px; }
    .help-section p, .help-section li { font-size: 13px; color: #555; line-height: 1.6; }
    .help-section ul { padding-left: 1.2rem; margin-top: 6px; }
    .help-section li { margin-bottom: 4px; }
    .tip { background: #fffbf0; border-left-color: var(--yellow); }
    .warn { background: #fff0f0; border-left-color: var(--red); }
  </style>
</head>
<body>
  <div class="reg-header">
    <img src="banner.jpg" alt="" class="reg-header-banner" />
    <div class="reg-header-content">
      <p class="reg-form-name" id="help-form-name">HELP FORM</p>
      <p class="reg-header-title" style="font-size:16px;margin-top:4px" id="help-title">How to use this form</p>
    </div>
  </div>

  <div class="reg-nav" style="padding:10px 16px;margin-bottom:0;border-bottom:1px solid var(--border)">
    <button class="reg-back-btn" id="back-btn" onclick="goBack()">← Back to Form</button>
  </div>

  <div class="help-body" id="help-content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const from = params.get('from') || 'admin';

    const guides = {
      admin: {
        name: 'EVENT REG FORM',
        title: 'Event Reg',
        back: 'admin.html',
        backLabel: '← Back to Event Reg Form',
        sections: [
          { title: '+ New Event', body: 'Tap <strong>+ New Event</strong> to create an event. Fill in the event name, organiser, date, number of days, and an optional event code. Add a MEL question if you need one — toggle whether it is optional or mandatory. Add a signatory name, title, and signature image for certificates.' },
          { title: 'Event list', body: 'Each row shows the event name, program, date, and status badge — Before Event, Live, or Ended. Tap any row to open the Event Admin Panel for that event.', tip: 'Events are sorted by most recently created.' },
          { title: 'MEL Dashboard', body: 'Opens a portfolio view showing registration totals, sign rates, gender breakdown, and per-event stats across all events.' },
        ]
      },
      event: {
        name: 'EVENT ADMIN PANEL',
        title: 'Event Admin Panel',
        back: 'javascript:history.back()',
        backLabel: '← Back to Event Admin Form',
        sections: [
          { title: 'Participant Reg Form', body: 'The primary form for event day. Opens a focused registration surface where staff can find existing participants by code, phone, name, org, or program — or register new walk-in participants. Attendance is recorded and signatures captured here.', tip: 'Use this on a tablet at the entrance on event day.' },
          { title: 'Not Yet Signed', body: 'Shows all participants who have not yet signed for a given day. Select the day using the buttons at the top. Tap any participant to go directly to their sign form.' },
          { title: 'Export PDF', body: 'Downloads a PDF attendance sheet for this event with all participants and their signed days.' },
          { title: 'QR Sheet', body: 'Generates a PDF with one QR code per participant. Print and cut for use as badges or desk cards — scanning a code goes directly to that participant\'s sign form.' },
          { title: 'Certificates', body: 'Generates participation certificates as a PDF for all participants who signed at least one day. Requires signatory name and title to be set on the event.' },
          { title: 'Check-in QR', body: 'Shows a single QR code for the whole event. Project it or display it — participants scan and enter their code to sign themselves in.' },
          { title: 'Edit Event', body: 'Password protected. Updates event name, organiser, date, days, code, and signatory details.', warn: 'Password required: ask your admin.' },
          { title: 'Import CSV', body: 'Upload a CSV file to bulk-import pre-registered participants. Download the template first to ensure the correct column format.' },
          { title: 'Edit Participants', body: 'Reveals the full participant list with search. Click any participant to open their sign form where details can be corrected.' },
          { title: 'Delete Event', body: 'Permanently deletes the event and all its participants. Password protected. This cannot be undone.', warn: 'This action is permanent.' },
        ]
      },
      register: {
        name: 'PARTICIPANT REG FORM',
        title: 'Participant Reg Form',
        back: 'javascript:history.back()',
        backLabel: '← Back to Participant Reg Form',
        sections: [
          { title: 'By Code', body: 'Enter the participant\'s 3-digit code (e.g. 001) or their phone number. Even a partial phone number (3+ digits) will show matching results.' },
          { title: 'By Name', body: 'Search by name, organisation, or program. Fuzzy matching handles typos — "Amaa" will still find "Ama".' },
          { title: 'Finding a participant', body: 'Once found, the participant\'s details appear with day buttons. Already-signed days are marked ✓ in green. Select the correct day and sign.' },
          { title: 'Walk-in Participant Reg', body: 'For participants not in the system. Fill in their details, select the day, and sign. A code is auto-generated and a confirmation email is sent if an email address is provided.' },
          { title: 'Navigation', body: 'The button at the top right changes based on where you are. On the find screen it takes you back to the Event Admin Panel. On the sign or registration screens it returns you to the find screen.' },
        ]
      },
      sign: {
        name: 'SIGN ATTENDANCE FORM',
        title: 'Sign Attendance Form',
        back: 'javascript:history.back()',
        backLabel: '← Back to Sign Attendance Form',
        sections: [
          { title: 'How it works', body: 'This form shows a participant\'s details and lets them sign attendance for a specific day. Select the correct day first, sign in the box, then tap Confirm Attendance.' },
          { title: 'Already signed', body: 'If a participant has already signed for a day, that day button is marked. You can still re-sign a day using the Re-sign option if needed.' },
          { title: 'Signature', body: 'Sign with a finger or stylus in the signature box. Tap Clear to start again.' },
        ]
      },
      checkin: {
        name: 'EVENT CHECK-IN FORM',
        title: 'Event Check-in Form',
        back: 'javascript:history.back()',
        backLabel: '← Back to Event Check-in Form',
        sections: [
          { title: 'Two modes', body: '<strong>Controlled:</strong> A staff member enters each participant\'s code for them.<br><br><strong>Self-service:</strong> The QR code is projected or displayed. Participants scan with their own phone, enter their code, and sign themselves.' },
          { title: 'Entering a code', body: 'Type the 3-digit participant code and tap Find Me. The participant\'s name and details will appear for confirmation before signing.' },
        ]
      },
      unsigned: {
        name: 'ATTENDANCE MONITOR',
        title: 'Attendance Monitor',
        back: 'javascript:history.back()',
        backLabel: '← Back to Attendance Monitor Form',
        sections: [
          { title: 'What it shows', body: 'Lists all participants who have not yet signed for the selected day. Use the day buttons at the top to switch between days.' },
          { title: 'Following up', body: 'Tap any participant in the list to open their sign form directly. After they sign, use the back button to return here and continue with the next person.' },
          { title: 'Day 1 vs later days', body: 'On Day 1, the list shows all pre-registered participants who have not checked in. On Day 2 and beyond, it shows everyone who was present before but has not yet signed for that day.' },
        ]
      },
      dashboard: {
        name: 'MEL DASHBOARD',
        title: 'MEL Dashboard',
        back: 'dashboard.html',
        backLabel: '← Back to MEL Dashboard Form',
        sections: [
          { title: 'Overview stats', body: 'Shows total events, registered participants, signed participants, overall sign rate, and gender breakdown across your entire portfolio.' },
          { title: 'Sign rate', body: 'The percentage of registered participants who signed at least one day. A gradient bar shows performance at a glance.' },
          { title: 'Per-event table', body: 'Each event shows its program, date, registration count, signed count, sign rate, and gender split. Sign rate is colour-coded: green is good, orange is moderate, red is low.' },
          { title: 'Filters', body: 'Filter by program or year using the dropdowns at the top to focus on a subset of events.' },
        ]
      },
      index: {
        name: 'PRE-REG FORM',
        title: 'Pre-Reg Form',
        back: 'javascript:history.back()',
        backLabel: '← Back to Pre-Reg Form',
        sections: [
          { title: 'What this form is for', body: 'Participants fill this in before the event. They enter their name, organisation, program, position, email, and phone. A unique code is assigned and sent by email.' },
          { title: 'The code', body: 'The participant code in the confirmation email is used at the event to find them quickly in the system. Encourage participants to keep it.' },
          { title: 'On event day', body: 'Pre-registered participants arrive and search by their code or name in the Participant Reg Form. They do not need to fill in their details again — just select the day and sign.' },
        ]
      },
    };

    const guide = guides[from] || guides['admin'];
    document.getElementById('help-form-name').textContent = guide.name;
    document.getElementById('help-title').textContent = guide.title;
    document.getElementById('back-btn').textContent = guide.backLabel;
    document.getElementById('back-btn').onclick = () => {
      if (guide.back.startsWith('javascript:')) { history.back(); }
      else { window.location.href = guide.back; }
    };

    const container = document.getElementById('help-content');
    guide.sections.forEach(s => {
      const cls = s.warn ? 'help-section warn' : s.tip ? 'help-section tip' : 'help-section';
      container.innerHTML += `<div class="${cls}"><h3>${s.title}</h3><p>${s.body}</p></div>`;
    });
  </script>
</body>
</html>
