<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participants</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="no-event" style="display:none">
    <div class="empty-state">
      <p class="empty-title">Event not found</p>
      <p class="empty-sub">Check your link and try again.</p>
    </div>
  </div>

  <div id="event-ui" style="display:none">
    <div class="reg-header">
      <img src="banner.jpg" alt="" class="reg-header-banner" />
      <div class="reg-header-content">
      <p class="reg-header-sub" id="event-code-prog"></p>
      <p class="reg-header-title" id="event-name"></p>
      <p class="reg-header-meta" id="event-meta"></p>
      </div>
    </div>

    <div class="event-body">
      <div class="reg-nav" style="flex-wrap:wrap;gap:8px">
        <span class="reg-form-title">Participants</span>
        <button class="reg-back-btn" id="back-to-events-btn" style="display:none" onclick="goBackToEvents()">← Back to Events</button>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-left:auto">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-muted)">Before:</span>
          <button class="reg-back-btn" onclick="openPreReg()">Pre-reg form</button>
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-muted)">During:</span>
          <button class="btn-action-red" onclick="openUnsigned()">Not yet signed</button>
          <button class="btn-action-orange" onclick="openWalkin()">Walk-in form</button>
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-muted)">After:</span>
          <button class="reg-back-btn" id="export-pdf-btn" onclick="exportEventPDF()">Export PDF</button>
          <button class="btn-sm" style="background:var(--black);color:white;border-color:var(--black)" onclick="exportEventQRSheet()">QR Sheet</button>
          <button class="btn-sm" id="cert-btn" style="display:none;background:var(--yellow);border-color:var(--yellow);color:var(--black);font-weight:700" onclick="generateEventCertificates()">🎓 Certificates</button>
        </div>
      </div>


      <div class="stats" id="view-stats"></div>

      <input type="text" id="p-search" placeholder="Search name, org, position, code..."
        oninput="filterParticipants()" class="search-input" style="margin-bottom:1rem" />

      <div id="participants-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="event.js"></script>
</body>
</html>
