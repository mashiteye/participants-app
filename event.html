<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participants</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="no-event" style="display:none">
    <div class="empty-state">
      <p class="empty-title">Event not found</p>
      <p class="empty-sub">Check your link and try again.</p>
    </div>
  </div>

  <div id="event-ui" style="display:none">
    <div class="reg-header">
      <img src="banner.jpg" alt="" class="reg-header-banner" />
      <div class="reg-header-content">
      <p class="reg-header-sub" id="event-code-prog"></p>
      <p class="reg-header-title" id="event-name"></p>
      <p class="reg-header-meta" id="event-meta"></p>
      </div>
    </div>

    <div class="event-body">
      <!-- Header row -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px">
        <div>
          <span class="reg-form-title">Participants</span>
          <span id="event-status-badge" style="margin-left:10px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em"></span>
        </div>
        <button class="reg-back-btn" id="back-to-events-btn" style="display:none" onclick="goBackToEvents()">← Back to Events</button>
      </div>

      <!-- Stats zone -->
      <div style="margin-bottom:1.5rem">
        <!-- Primary KPI -->
        <div style="display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:8px">
          <div class="stat-card" id="stat-registered" style="border-left:4px solid var(--red)">
            <div class="stat-num" id="stat-registered-num" style="color:var(--red)">—</div>
            <div class="stat-label">Registered</div>
          </div>
        </div>
        <!-- Gender group -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <div class="stat-card"><div class="stat-num" id="stat-female" style="color:var(--black)">—</div><div class="stat-label">Female</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-male" style="color:var(--black)">—</div><div class="stat-label">Male</div></div>
        </div>
        <!-- Days group -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px" id="stat-days"></div>
      </div>

      <!-- Primary CTA: Participant Registration Form -->
      <div style="margin-bottom:1.25rem">
        <button onclick="openRegistration()" style="width:100%;padding:20px;background:linear-gradient(90deg,var(--red) 0%,var(--orange) 100%);color:white;border:none;border-radius:var(--radius-lg);font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(235,0,27,0.35);letter-spacing:0.01em">
          Participant Registration Form →
        </button>
      </div>

      <!-- Action toolbar — three contained zones -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem">

        <!-- Zone 1: Registration -->
        <div style="background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
          <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;border-bottom:2px solid var(--yellow);padding-bottom:5px">Registration</p>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button onclick="openPreReg()" style="padding:12px;background:white;border:1.5px solid var(--black);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;transition:all 0.15s" onmouseover="this.style.background='var(--black)';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='inherit'">📋 Pre-registration Form</button>
            <button onclick="openWalkin()" style="padding:12px;background:var(--orange);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:white;text-align:left">➕ Walk-in Form</button>
          </div>
        </div>

        <!-- Zone 2: Attendance -->
        <div style="background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
          <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;border-bottom:2px solid var(--orange);padding-bottom:5px">Attendance</p>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button onclick="openUnsigned()" style="padding:12px;background:var(--red);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:white;text-align:left">⚠ Not Yet Signed</button>
            <button onclick="loadParticipants()" style="padding:12px;background:white;border:1.5px solid var(--black);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;transition:all 0.15s" onmouseover="this.style.background='var(--black)';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='inherit'">↻ Refresh Data</button>
          </div>
        </div>

        <!-- Zone 3: Exports -->
        <div style="background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
          <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;border-bottom:2px solid var(--red);padding-bottom:5px">Exports</p>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button id="export-pdf-btn" onclick="exportEventPDF()" style="padding:12px;background:var(--red);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:white;text-align:left">📄 Export PDF</button>
            <button onclick="exportEventQRSheet()" style="padding:12px;background:white;border:1.5px solid var(--black);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;transition:all 0.15s" onmouseover="this.style.background='var(--black)';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='inherit'">📱 QR Sheet</button>
            <button id="cert-btn" onclick="generateEventCertificates()" style="display:none;padding:12px;background:var(--yellow);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--black);text-align:left">🎓 Certificates</button>
          </div>
        </div>

        <!-- Zone 4: Manage (admin only) -->
        <div id="manage-zone" style="display:none;background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
          <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;border-bottom:2px solid var(--black);padding-bottom:5px">Manage Event</p>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button onclick="editEvent()" style="padding:12px;background:white;border:1.5px solid var(--black);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;transition:all 0.15s" onmouseover="this.style.background='var(--black)';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='inherit'">✏ Edit Event</button>
            <button onclick="importCSV()" style="padding:12px;background:var(--yellow);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--black);text-align:left">↑ Import CSV</button>
            <hr style="border:none;border-top:0.5px solid var(--border);margin:4px 0">
            <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:4px">Share Links</p>
            <button id="share-prereg-btn" onclick="copyShareLink('prereg')" style="padding:10px 12px;background:white;border:1.5px solid var(--orange);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--orange);text-align:left">📋 Pre-reg Link</button>
            <button id="share-walkin-btn" onclick="copyShareLink('walkin')" style="padding:10px 12px;background:white;border:1.5px solid var(--orange);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--orange);text-align:left">➕ Walk-in Link</button>
            <button id="share-view-btn" onclick="copyShareLink('view')" style="padding:10px 12px;background:white;border:1.5px solid var(--orange);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--orange);text-align:left">👥 Participant Link</button>
            <button id="share-checkin-btn" onclick="copyShareLink('checkin')" style="padding:10px 12px;background:white;border:1.5px solid var(--orange);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--orange);text-align:left">🔗 Check-in Link</button>
            <hr style="border:none;border-top:0.5px solid var(--border);margin:4px 0">
            <button onclick="deleteEventFromPage()" style="padding:10px 12px;background:white;border:1.5px solid var(--red);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--red);text-align:left">🗑 Delete Event</button>
          </div>
        </div>

      </div>

      <!-- Participants table zone -->
      <div style="background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <p style="font-size:13px;font-weight:700;color:var(--black)">Participants List <span id="list-count-label" style="font-weight:400;color:var(--text-muted);font-size:12px"></span></p>
        </div>
        <input type="text" id="p-search" placeholder="Search name, org, position, code..."
          oninput="filterParticipants()" class="search-input" style="margin-bottom:1rem" />
        <div id="participants-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="event.js" defer></script>
</body>
</html>
