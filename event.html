<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METSS LBG Participants</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="no-event" style="display:none">
    <div class="empty-state">
      <p class="empty-title">Event not found</p>
      <p class="empty-sub">Check your link and try again.</p>
    </div>
  </div>

  <div id="event-ui" style="display:none">
    <div class="reg-header">
      <img src="banner.jpg" alt="" class="reg-header-banner" />
      <div class="reg-header-content">
      <p class="reg-header-sub" id="event-code-prog"></p>
      <p class="reg-header-title" id="event-name"></p>
      <p class="reg-header-meta" id="event-meta"></p>
      </div>
    </div>

    <div class="event-body">
      <!-- Header row -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px">
        <div>
          <span class="reg-form-title">Participants</span>
          <span id="event-status-badge" style="margin-left:10px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em"></span>
        </div>
        <button class="reg-back-btn" id="back-to-events-btn" style="display:none" onclick="goBackToEvents()">← Back to Events</button>
      </div>

      <!-- Stats zone: Days only -->
      <div style="margin-bottom:1.5rem">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px" id="stat-days"></div>
      </div>

      <!-- Participant Registration Form — hero button -->
      <div style="margin-bottom:1.25rem">
        <button onclick="openRegistration()" style="width:100%;padding:20px;background:linear-gradient(90deg,var(--red) 0%,var(--orange) 100%);color:white;border:none;border-radius:var(--radius-lg);font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(235,0,27,0.35);letter-spacing:0.01em">
          Participant Registration Form →
        </button>
      </div>

      <!-- Secondary buttons: 2-3 column grid -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem">
        <button onclick="openUnsigned()" style="padding:14px 8px;background:var(--red);color:white;border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center">⚠ Not Yet Signed</button>
        <button id="export-pdf-btn" onclick="exportEventPDF()" style="padding:14px 8px;background:var(--black);color:white;border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center">📄 Export PDF</button>
        <button onclick="exportEventQRSheet()" style="padding:14px 8px;background:white;border:1.5px solid var(--black);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center">📱 QR Sheet</button>
        <button id="cert-btn" onclick="generateEventCertificates()" style="display:none;padding:14px 8px;background:var(--yellow);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--black);text-align:center">🎓 Certificates</button>
        <button id="share-prereg-btn" onclick="copyShareLink('prereg')" style="padding:14px 8px;background:white;border:1.5px solid var(--orange);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--orange);text-align:center">📋 Pre-reg Link</button>
        <button id="share-view-btn" onclick="copyShareLink('view')" style="padding:14px 8px;background:white;border:1.5px solid var(--orange);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--orange);text-align:center">👥 Participant Link</button>
        <button onclick="showEventCheckinQR()" style="padding:14px 8px;background:var(--black);color:white;border:none;border-radius:var(--radius-md);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center">📱 Check-in QR</button>
        <!-- Admin only -->
        <button id="edit-event-btn" onclick="promptEditEvent()" style="display:none;padding:14px 8px;background:white;border:1.5px solid var(--black);border-radius:var(--radius-md);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center">✏ Edit Event</button>
        <button id="import-csv-btn" onclick="importCSV()" style="display:none;padding:14px 8px;background:var(--yellow);border:none;border-radius:var(--radius-md);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--black);text-align:center">↑ Import CSV</button>
        <button id="delete-event-btn" onclick="promptDeleteEvent()" style="display:none;padding:14px 8px;background:white;border:1.5px solid var(--red);border-radius:var(--radius-md);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--red);text-align:center">🗑 Delete Event</button>
      </div>

      <!-- Password modal for admin actions -->
      <div id="admin-pwd-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem">
        <div style="background:white;border-radius:16px;padding:2rem;max-width:320px;width:100%">
          <p style="font-size:15px;font-weight:700;margin-bottom:1rem" id="admin-pwd-title">Admin Action</p>
          <input type="password" id="admin-pwd-input" placeholder="Password" style="margin-bottom:0.75rem;width:100%" onkeydown="if(event.key==='Enter')checkAdminPwd()" />
          <p id="admin-pwd-err" style="font-size:12px;color:var(--red);display:none;margin-bottom:0.5rem">Incorrect password.</p>
          <div style="display:flex;gap:8px">
            <button onclick="checkAdminPwd()" style="flex:1;padding:12px;background:#EB001B;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Confirm</button>
            <button onclick="closeAdminPwd()" style="flex:1;padding:12px;background:white;border:1.5px solid #000;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Cancel</button>
          </div>
        </div>
      </div>

    </div>

  <!-- Check-in QR Modal -->
  <div id="checkin-qr-modal-ev" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:1rem">
    <div style="background:white;border-radius:20px;padding:2rem;max-width:340px;width:100%;text-align:center">
      <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:6px">Check-in QR Code</p>
      <p style="font-size:15px;font-weight:800;margin-bottom:1.25rem" id="ev-qr-event-name"></p>
      <div style="display:flex;justify-content:center;margin-bottom:1rem;padding:1rem;background:#f9f9f9;border-radius:12px;border:3px solid var(--yellow)">
        <canvas id="ev-checkin-qr-canvas"></canvas>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:1.5rem">Display or project — participants scan and enter their code</p>
      <div style="display:flex;gap:10px">
        <button onclick="downloadEvCheckinQR()" style="flex:1;padding:12px;background:var(--red);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Download</button>
        <button onclick="document.getElementById('checkin-qr-modal-ev').style.display='none'" style="flex:1;padding:12px;background:white;border:1.5px solid var(--black);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="event.js" defer></script>
</body>
</html>
