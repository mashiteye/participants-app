<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participants</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="no-event" style="display:none">
    <div class="empty-state">
      <p class="empty-title">Event not found</p>
      <p class="empty-sub">Check your link and try again.</p>
    </div>
  </div>

  <div id="event-ui" style="display:none">
    <div class="reg-header">
      <img src="banner.jpg" alt="" class="reg-header-banner" />
      <div class="reg-header-content">
      <p class="reg-header-sub" id="event-code-prog"></p>
      <p class="reg-header-title" id="event-name"></p>
      <p class="reg-header-meta" id="event-meta"></p>
      </div>
    </div>

    <div class="event-body">
      <div class="reg-nav">
        <span class="reg-form-title">Participant Search Form</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="reg-back-btn" onclick="exportEventPDF()">Export PDF</button>
          <button class="btn-action-red" onclick="openUnsigned()">Not yet signed</button>
          <button class="reg-back-btn" onclick="openPreReg()">Pre-reg form</button>
          <button class="btn-action-orange" onclick="openWalkin()">Walk-in form</button>
        </div>
      </div>


      <div class="stats" id="view-stats"></div>

      <input type="text" id="p-search" placeholder="Search name, org, position, code..."
        oninput="filterParticipants()" class="search-input" style="margin-bottom:1rem" />

      <div id="participants-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="event.js"></script>
</body>
</html>
