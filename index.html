<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participant Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="no-event" style="display:none">
    <div class="empty-state">
      <p class="empty-title">No event specified</p>
      <p class="empty-sub">Use a registration link provided by your program coordinator.</p>
    </div>
  </div>

  <div id="event-ui" style="display:none">
    <div class="reg-header">
      <p class="reg-header-sub" id="event-program"></p>
      <p class="reg-header-title" id="event-name"></p>
    </div>

    <div class="reg-body">
      <div class="success-msg" id="success" style="display:none">
        <p style="font-size:15px;font-weight:600;margin-bottom:4px">You are registered, <span id="confirm-name"></span>!</p>
        <p style="font-size:13px;margin-bottom:2px">Your participant code is:</p>
        <p style="font-size:28px;font-weight:700;letter-spacing:0.08em;margin:6px 0" id="confirm-code"></p>
        <p style="font-size:12px;opacity:0.8">Keep this code — you will need it to sign attendance on the event day.</p>
      </div>

      <div class="field-group">
        <label>Full Name *</label>
        <input type="text" id="f-name" placeholder="" />
      </div>

      <div class="field-group">
        <label>Sex *</label>
        <div class="toggle-group">
          <button class="toggle-btn" id="btn-male" onclick="setSex('Male')">Male</button>
          <button class="toggle-btn" id="btn-female" onclick="setSex('Female')">Female</button>
        </div>
        <input type="hidden" id="f-sex" />
      </div>

      <div class="field-group">
        <label>Organization *</label>
        <input type="text" id="f-org" placeholder="" />
      </div>

      <div class="field-group">
        <label>Program Name *</label>
        <input type="text" id="f-prog" placeholder="" />
      </div>

      <div class="field-group">
        <label>Position *</label>
        <input type="text" id="f-position" placeholder="" />
      </div>

      <div class="field-group">
        <label>Email *</label>
        <input type="email" id="f-email" placeholder="" />
      </div>

      <div class="field-group">
        <label>Phone Number *</label>
        <input type="tel" id="f-phone" placeholder="" />
      </div>

      <div class="field-group" id="mel-question-group" style="display:none">
        <label id="mel-question-label">MEL Question</label>
        <textarea id="f-mel" rows="3"></textarea>
      </div>

      <div class="field-group" id="day-group" style="display:none">
        <label>Day *</label>
        <div class="toggle-group" id="day-buttons"></div>
        <input type="hidden" id="f-day" />
      </div>

      <div class="field-group">
        <label>Signature *</label>
        <div class="sig-container">
          <canvas id="sig-canvas"></canvas>
          <p class="sig-hint">Sign here</p>
        </div>
        <button class="btn-clear-sig" onclick="clearSig()">Clear</button>
      </div>

      <span id="err-msg" class="err-msg"></span>
      <button class="btn-submit" id="submit-btn" onclick="registerParticipant()">Submit &amp; Sign</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
