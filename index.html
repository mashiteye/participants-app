<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participant Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <div id="no-event" style="display:none">
      <div class="empty-state">
        <p class="empty-title">No event specified</p>
        <p class="empty-sub">Use a registration link provided by your program coordinator.</p>
        <a href="admin.html" class="btn-secondary" style="display:inline-block;margin-top:1rem;text-decoration:none">Admin panel</a>
      </div>
    </div>

    <div id="event-ui" style="display:none">
      <header class="app-header">
        <p class="app-subtitle" id="event-program"></p>
        <h1 class="app-title" id="event-name"></h1>
        <p class="event-meta" id="event-meta"></p>
      </header>

      <div class="success-msg" id="success">You have been registered successfully.</div>
      <div class="form-grid">
        <div class="form-group"><label>Full name *</label><input type="text" id="f-name" placeholder="e.g. Ama Asante" /></div>
        <div class="form-group"><label>Organization *</label><input type="text" id="f-org" placeholder="e.g. Farmerline Ghana" /></div>
        <div class="form-group"><label>Role / Title</label><input type="text" id="f-role" placeholder="e.g. M&E Officer" /></div>
        <div class="form-group">
          <label>Program / Affiliation</label>
          <select id="f-prog">
            <option value="">-- Select --</option>
            <option value="AYAW">AYAW</option>
            <option value="FIRST+II">FIRST+II</option>
            <option value="BIA">BIA (BRIDGE-in-Agriculture)</option>
            <option value="FILMA">FILMA</option>
            <option value="MCF">Mastercard Foundation</option>
            <option value="Other">Other / Independent</option>
          </select>
        </div>
        <div class="form-group"><label>Phone number</label><input type="tel" id="f-phone" placeholder="e.g. 0244 000 000" /></div>
        <div class="form-group"><label>Email address</label><input type="email" id="f-email" placeholder="e.g. ama@org.com" /></div>
        <div class="form-group">
          <label>Region</label>
          <select id="f-region">
            <option value="">-- Select --</option>
            <option>Greater Accra</option><option>Ashanti</option><option>Northern</option>
            <option>Volta</option><option>Eastern</option><option>Western</option>
            <option>Central</option><option>Upper East</option><option>Upper West</option>
            <option>Bono East</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="f-gender">
            <option value="">-- Select --</option>
            <option>Female</option><option>Male</option><option>Prefer not to say</option>
          </select>
        </div>
        <div class="form-group full"><label>Notes (dietary, accessibility, etc.)</label><textarea id="f-notes" rows="2"></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="submit-btn" onclick="registerParticipant()">Register</button>
        <span id="err-msg" class="err-msg"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
