<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participant Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <header class="app-header">
      <p class="app-subtitle" id="app-subtitle">Participant Registration</p>
      <h1 class="app-title" id="app-title">MEL CoP Convening</h1>
    </header>

    <nav class="tabs">
      <button class="tab active" onclick="showTab('register')">Register</button>
      <button class="tab" id="tab-participants" onclick="showTab('participants')">Participants</button>
    </nav>

    <div id="pane-register">
      <div class="success-msg" id="success">Participant registered successfully.</div>
      <div class="form-grid">
        <div class="form-group"><label>Full name *</label><input type="text" id="f-name" placeholder="e.g. Ama Asante" /></div>
        <div class="form-group"><label>Organization *</label><input type="text" id="f-org" placeholder="e.g. Farmerline Ghana" /></div>
        <div class="form-group"><label>Role / Title</label><input type="text" id="f-role" placeholder="e.g. M&E Officer" /></div>
        <div class="form-group">
          <label>Program / Affiliation *</label>
          <select id="f-prog">
            <option value="">-- Select --</option>
            <option value="AYAW">AYAW</option>
            <option value="FIRST+II">FIRST+II</option>
            <option value="BIA">BIA (BRIDGE-in-Agriculture)</option>
            <option value="FILMA">FILMA</option>
            <option value="MCF">Mastercard Foundation</option>
            <option value="Other">Other / Independent</option>
          </select>
        </div>
        <div class="form-group"><label>Phone number</label><input type="tel" id="f-phone" placeholder="e.g. 0244 000 000" /></div>
        <div class="form-group"><label>Email address</label><input type="email" id="f-email" placeholder="e.g. ama@org.com" /></div>
        <div class="form-group">
          <label>Region</label>
          <select id="f-region">
            <option value="">-- Select --</option>
            <option>Greater Accra</option><option>Ashanti</option><option>Northern</option>
            <option>Volta</option><option>Eastern</option><option>Western</option>
            <option>Central</option><option>Upper East</option><option>Upper West</option>
            <option>Bono East</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="f-gender">
            <option value="">-- Select --</option>
            <option>Female</option><option>Male</option><option>Prefer not to say</option>
          </select>
        </div>
        <div class="form-group full"><label>Notes (dietary, accessibility, etc.)</label><textarea id="f-notes" rows="2"></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="registerParticipant()">Register participant</button>
        <button class="btn-secondary" onclick="clearForm()">Clear</button>
        <span id="err-msg" class="err-msg"></span>
      </div>
    </div>

    <div id="pane-participants" style="display:none">
      <div class="stats" id="stats-grid"></div>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search name, org, program..." oninput="renderList()" class="search-input" />
        <div class="toolbar-actions">
          <button class="btn-secondary" onclick="exportCSV()">Export CSV</button>
          <button class="btn-danger" onclick="if(confirm('Clear ALL participants? This cannot be undone.'))clearAll()">Clear all</button>
        </div>
      </div>
      <div id="list-container"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
