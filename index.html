<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Registration — METSS LBG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="no-event" style="display:none">
    <div class="empty-state">
      <p class="empty-title">No event specified</p>
      <p class="empty-sub">Use a registration link provided by your program coordinator.</p>
    </div>
  </div>

  <div id="event-ui" style="display:none">
    <div class="reg-header">
      <img src="banner.jpg" alt="" class="reg-header-banner" />
      <div class="reg-header-content">
      <p class="reg-header-sub" id="event-program"></p>
      <p class="reg-header-title" id="event-name"></p>
      <p class="reg-header-meta" id="event-meta"></p>
      </div>
    </div>

    <div class="reg-body">
      <div class="reg-nav">
        <span class="reg-form-title" id="form-type-label">Registration Form</span>
        <button class="reg-back-btn" id="back-btn" onclick="goBack()">← Participant Search</button>
      </div>

      <!-- Success popup modal -->
      <div id="success-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:1rem;overflow-y:auto">
        <div style="background:white;border-radius:16px;padding:2rem 1.5rem;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);margin:auto">
          <div style="width:56px;height:56px;background:#fff3e8;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:24px">✓</div>
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:4px">Registration confirmed</p>
          <p style="font-size:18px;font-weight:700;margin-bottom:1rem" id="confirm-name"></p>
          <div style="background:var(--bg-secondary);border-radius:10px;padding:1rem;margin-bottom:1rem">
            <p style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Your participant code</p>
            <p style="font-size:36px;font-weight:800;letter-spacing:0.1em;color:var(--orange)" id="confirm-code"></p>
          </div>
          <p style="font-size:12px;color:var(--text-muted);margin-bottom:1.25rem" id="confirm-hint"></p>
          <button class="btn-submit" onclick="closeSuccessModal()" style="margin-top:0">Done</button>
        </div>
      </div>
      </div>

      <div class="field-group">
        <label>Full Name *</label>
        <input type="text" id="f-name" />
      </div>

      <div class="field-group">
        <label>Sex *</label>
        <div class="toggle-group">
          <button class="toggle-btn" id="btn-male" onclick="setSex('Male')">Male</button>
          <button class="toggle-btn" id="btn-female" onclick="setSex('Female')">Female</button>
        </div>
        <input type="hidden" id="f-sex" />
      </div>

      <div class="field-group">
        <label>Organization *</label>
        <input type="text" id="f-org" />
      </div>

      <div class="field-group">
        <label>Program Name *</label>
        <input type="text" id="f-prog" />
      </div>

      <div class="field-group">
        <label>Position *</label>
        <input type="text" id="f-position" />
      </div>

      <div class="field-group">
        <label>Email *</label>
        <input type="email" id="f-email" />
      </div>

      <div class="field-group">
        <label>Phone Number *</label>
        <input type="tel" id="f-phone" />
      </div>

      <div class="field-group" id="mel-question-group" style="display:none">
        <label id="mel-question-label">MEL Question</label>
        <textarea id="f-mel" rows="3"></textarea>
      </div>

      <!-- Walk-in only: day + signature -->
      <div id="walkin-fields" style="display:none">
        <div class="field-group" id="day-group" style="display:none">
          <label>Day *</label>
          <div class="toggle-group" id="day-buttons"></div>
          <input type="hidden" id="f-day" />
        </div>

        <div class="field-group">
          <label>Signature *</label>
          <div class="sig-container">
            <canvas id="sig-canvas"></canvas>
            <p class="sig-hint">Sign here</p>
          </div>
          <button class="btn-clear-sig" onclick="clearSig()">Clear</button>
        </div>
      </div>

      <span id="err-msg" class="err-msg" style="display:none"></span>
      <button class="btn-submit" id="submit-btn" onclick="registerParticipant()">Submit &amp; Register</button>
    </div>
  </div>

  <!-- Duplicate warning modal -->
  <div id="dup-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:1rem">
    <div style="background:white;border-radius:16px;padding:2rem 1.5rem;max-width:360px;width:100%">
      <div style="font-size:28px;margin-bottom:0.75rem;text-align:center">⚠️</div>
      <p style="font-size:15px;font-weight:700;margin-bottom:0.75rem;text-align:center" id="dup-title"></p>
      <div style="background:var(--bg-secondary);border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:13px" id="dup-details"></div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:1.25rem">If this is a different person, click <strong>Proceed</strong>. If it is the same person, click <strong>Cancel</strong>.</p>
      <div style="display:flex;gap:10px">
        <button class="btn-submit" id="dup-proceed" onclick="proceedDespiteDuplicate()" style="margin-top:0;flex:1">Proceed</button>
        <button class="btn-secondary" onclick="closeDupModal()" style="flex:1">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
